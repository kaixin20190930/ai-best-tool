name: Production Health Monitor

on:
  push:
    branches:
      - main
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: Check Production Health Endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Keep monitoring useful even before the optional repository secret is set.
      MONITOR_BASE_URL: ${{ secrets.MONITOR_BASE_URL || 'https://aibesttool.com' }}
      MONITOR_API_TOKEN: ${{ secrets.MONITOR_API_TOKEN }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

    steps:

      - name: Check /api/healthz
        run: |
          set -e
          BASE_URL="${MONITOR_BASE_URL%/}"
          HTTP_CODE=$(curl -sS -o /tmp/healthz.json -w "%{http_code}" "$BASE_URL/api/healthz")
          echo "healthz_http_code=$HTTP_CODE"
          test "$HTTP_CODE" = "200"
          grep -q '"ok":true' /tmp/healthz.json

      - name: Check /api/monitor
        run: |
          set -e
          BASE_URL="${MONITOR_BASE_URL%/}"
          if [ -n "${MONITOR_API_TOKEN}" ]; then
            HTTP_CODE=$(curl -sS -o /tmp/monitor.json -w "%{http_code}" \
              -H "Authorization: Bearer ${MONITOR_API_TOKEN}" \
              "$BASE_URL/api/monitor")
          else
            echo "MONITOR_API_TOKEN is not set; skipping protected /api/monitor check."
            exit 0
          fi
          echo "monitor_http_code=$HTTP_CODE"
          test "$HTTP_CODE" = "200"
          grep -q '"ok":true' /tmp/monitor.json

      - name: Check /api/health
        run: |
          set -e
          BASE_URL="${MONITOR_BASE_URL%/}"
          HTTP_CODE=$(curl -sS -o /tmp/health.json -w "%{http_code}" "$BASE_URL/api/health")
          echo "health_http_code=$HTTP_CODE"
          test "$HTTP_CODE" = "200"
          grep -q '"status":"healthy"' /tmp/health.json

      - name: Check SEO core pages
        run: |
          set -euo pipefail
          BASE_URL="${MONITOR_BASE_URL}"
          BASE_URL="${BASE_URL%/}"

          for ROUTE in /cn /cn/explore /cn/best-ai-tools /cn/ai/fathom /cn/ai/pipedream; do
            HTTP_CODE=$(curl -sS -L --retry 3 --retry-delay 2 --retry-all-errors \
              --connect-timeout 10 --max-time 30 \
              -o /tmp/seo-page.html -w "%{http_code}" "$BASE_URL$ROUTE")
            echo "$ROUTE http_code=$HTTP_CODE"
            test "$HTTP_CODE" -ge 200
            test "$HTTP_CODE" -lt 400
          done

      - name: Check robots sitemap directive
        run: |
          set -euo pipefail
          BASE_URL="${MONITOR_BASE_URL%/}"
          curl -sS -L --retry 3 --retry-delay 2 --retry-all-errors \
            --connect-timeout 10 --max-time 30 "$BASE_URL/robots.txt" -o /tmp/robots.txt
          grep -Eiq '^Sitemap:[[:space:]]*https?://[^[:space:]]+/sitemap\.xml[[:space:]]*$' /tmp/robots.txt

      - name: Check sitemap index surface
        run: |
          set -euo pipefail
          BASE_URL="${MONITOR_BASE_URL%/}"
          curl -sS -L --retry 3 --retry-delay 2 --retry-all-errors \
            --connect-timeout 10 --max-time 30 "$BASE_URL/sitemap.xml" -o /tmp/sitemap.xml
          test "$(grep -c '<loc>' /tmp/sitemap.xml)" -gt 0
          ! grep -Eq '<loc>[^<]*/(admin|login|register|profile|pricing|submit|developer/listing|new|startup)(/|</loc>)' /tmp/sitemap.xml
          ! grep -q 'comparison' /tmp/sitemap.xml

      - name: Notify Feishu on Failure (optional)
        if: failure() && env.FEISHU_WEBHOOK_URL != ''
        run: |
          BASE_URL="${MONITOR_BASE_URL%/}"
          PAYLOAD=$(cat <<EOF
          {
            "msg_type": "text",
            "content": {
              "text": "AI Best Tool production health check failed.\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nTarget: ${BASE_URL}"
            }
          }
          EOF
          )
          curl -sS -X POST "${FEISHU_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
